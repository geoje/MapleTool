name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - frontend/**
              - .github/workflows/cd.yaml
              - docker-compose-fe.yaml
            backend:
              - backend/**
              - .github/workflows/cd.yaml
              - docker-compose-be.yaml
              - docker-compose-db.yaml

  frontend:
    needs: filter
    if: ${{ needs.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nodejs 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install modules
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Copy dist
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: frontend/dist/, frontend/Dockerfile, frontend/nginx.conf, docker-compose-fe.yaml
          target: ~/${{ github.event.repository.name }}

      - name: Update fe
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/${{ github.event.repository.name }}
            STACK=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')
            docker compose -f docker-compose-fe.yaml build
            docker service ls | grep -qw "${STACK}_fe" && EXISTS="true" || EXISTS="false"
            docker stack deploy --with-registry-auth --detach=${EXISTS} -c docker-compose-fe.yaml "${STACK}"
            [ "${EXISTS}" = "true" ] && docker service update --force --detach=false "${STACK}_fe" || true

  backend:
    needs: filter
    if: ${{ needs.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Build
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy jar
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: backend/build/libs/, backend/Dockerfile, docker-compose-be.yaml, docker-compose-db.yaml
          target: ~/${{ github.event.repository.name }}

      - name: Setup environment variables
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/${{ github.event.repository.name }}
            cat > .env << 'EOF'
            JASYPT_PASSWORD=${{ secrets.JASYPT_PASSWORD }}
            GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            EOF

      - name: Update db
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/${{ github.event.repository.name }}
            export $(cat .env)
            docker compose -f docker-compose-db.yaml pull
            docker compose -f docker-compose-db.yaml up -d

      - name: Update be
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/${{ github.event.repository.name }}
            export $(cat .env)
            STACK=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')
            docker compose -f docker-compose-be.yaml build
            docker service ls | grep -qw "${STACK}_be" && EXISTS="true" || EXISTS="false"
            docker stack deploy --with-registry-auth --detach=${EXISTS} -c docker-compose-be.yaml "${STACK}"
            [ "${EXISTS}" = "true" ] && docker service update --force --detach=false "${STACK}_be" || true
