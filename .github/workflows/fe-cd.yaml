name: Frontend Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/fe-cd.yaml
      - docker-compose-fe.yaml

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Nodejs 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install modules
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Copy dist
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: frontend/dist/, frontend/Dockerfile, frontend/nginx.conf, docker-compose-fe.yaml
          target: ~/${{ github.event.repository.name }}

      - name: Update fe
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd ~/${{ github.event.repository.name }}
            docker compose -f docker-compose-fe.yaml build
            STACK=$(echo ${{ github.event.repository.name }} | tr '[:upper:]' '[:lower:]')
            if docker service ls | grep -qw ${STACK}_fe; then
              docker service update --force --detach=false ${STACK}_fe
            else
              docker stack deploy -c docker-compose-fe.yaml ${STACK}
            fi